name: Funbox Monitor Bot

on:
  schedule:
    - cron: '*/5 * * * *' # 每 5 分鐘運行一次 (GitHub Actions Cron)
  workflow_dispatch:       # 支援手動從 GitHub 網頁觸發

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true # 當前定時任務若有延遲重疊，自動取消舊任務，防止併發 Push

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' # 啟用 Node.js 24 以消除 Deprecation 警告

permissions:
  contents: write          # 必須授予寫入權限以將 SQLite 資料庫變更 push 回 Repo

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取完整歷史以支援 git pull --rebase

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Monitor
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RUN_ONCE: 'true'
        run: |
          # 檢查目前分鐘是否在整點附近（頭 5 分鐘內），是的話發送整點庫存彙整報告
          MIN=$(date +%M)
          # 去除可能出現的 8 進位字首 0（例如 08, 09 在 bash 會報錯，故用 10# 強制轉 10 進位）
          MIN_VAL=$((10#$MIN))
          if [ "$MIN_VAL" -lt 5 ]; then
            echo "Detecting hour boundary (current minute: $MIN_VAL), enabling SEND_REPORT..."
            export SEND_REPORT="true"
          fi
          node funbox_monitor.js

      - name: Commit and Push DB Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add funbox_monitor.db
          # 僅在 SQLite 資料庫有變更時才 commit，避免腳本出錯
          if ! git diff --cached --quiet; then
            git commit -m "chore: update funbox_monitor.db database state [skip ci]"
            # 每次 push 前主動拉取並 rebase（若有衝突則自動選擇我們的 db 覆蓋），防止因 set -e 導致 push 失敗後步驟直接中止
            git pull --rebase --strategy-option=theirs origin main
            git push
          else
            echo "No database changes detected."
          fi
